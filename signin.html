<section class="container py-5" style="min-height: 70vh;">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="form-card">
                <h3 class="text-center mb-4"><i class="fas fa-sign-in-alt me-2"></i>Sign In</h3>
                <form>
                    <div class="mb-3">
                        <label for="signinEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="signinEmail" placeholder="name@example.com" />
                    </div>
                    <div class="mb-3">
                        <label for="signinPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="signinPassword" placeholder="Enter your password" />
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" />
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
                <p class="mt-3 text-center">Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>
</section>
